<!doctype html>
<html lang="en">
  <head>
    <!-- =========================================================
        BASIC META / PAGE INFO
      ========================================================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cycle Escapes - Contact Us</title>

    <!-- =========================================================
      ICON + THEME COLOUR
    ========================================================== -->
    <link rel="icon" href="graphics/favicon-32x32.png" type="image/png" />
    <meta name="theme-color" content="#1f2a36" />

    <!-- =========================================================
      STYLESHEETS
    ========================================================== -->
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/contact.css" />
  </head>

  <body>
    <header>
      <!-- =========================================================
      HEADER (Logo + Title + Date)
    ========================================================== -->
      <!-- =========================================================
        NAVIGATION FOR INDEX PAGE PLACEHOLDER (Loaded dynamically)
      ========================================================== -->
      <div id="nav-placeholder"></div>
      <div class="indexlogo-container">
        <img
          src="/graphics/Cycle_Escapes_Logo_White_on_Blue.png"
          alt="Cycle Escapes Ride Logo"
          class="indexlogo"
        />
      </div>
    </header>

    <h1>Contact Us</h1>
    <p class="centered-header">
      Fill in the form below and we'll get back to you as soon as possible.
    </p>

    <form
      name="contact"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
    >
      <!-- Required for Netlify -->
      <input type="hidden" name="form-name" value="contact" />

      <!-- Honeypot field -->
      <div style="display: none">
        <label>
          Don’t fill this out:
          <input name="bot-field" />
        </label>
      </div>

      <div class="form-group">
        <label for="name">Your Name</label>
        <input id="name" type="text" name="name" required autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="email">Your Email</label>
        <input
          id="email"
          type="email"
          name="email"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5" required></textarea>
      </div>

      <button type="submit">Send Message</button>
    </form>

    <!-- =========================================================
      FOOTER PLACEHOLDER
    ========================================================== -->
    <div id="footer-placeholder"></div>

    <!-- =========================================================
      FLOATING REFRESH BUTTON (PWA only)
    ========================================================== -->
    <button id="refreshButton" title="Refresh">🔄</button>

    <!-- =========================================================
      PAGE SCRIPTS
      (defer = loads after HTML parsing, safer for DOM elements)
      ========================================================== -->
    <script src="js/temp.js" defer></script>
    <script src="js/site.js" defer></script>
  </body>
</html>
