<!doctype html>
<html lang="en">
  <head>
    <!-- =========================================================
      BASIC META / PAGE INFO
    ========================================================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cycle Escapes - Contact Us</title>
    <!-- =========================================================
      ICON + THEME COLOUR
    ========================================================== -->
    <link rel="icon" href="graphics/favicon-32x32.png" type="image/png" />
    <meta name="theme-color" content="#1f2a36" />

    <link rel="stylesheet" href="css/contact.css" />
  </head>

  <body>
    <!-- =========================================================
      HEADER (Nav injected dynamically)
    ========================================================== -->
    <header>
      <div id="nav-placeholder"></div>
    </header>

    <div class="container">
      <h1>Contact Us</h1>

      <form id="contactForm">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name" required />
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required />
        </div>

        <div class="form-group">
          <label>Message</label>
          <textarea id="message" required></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>

      <div id="responseMessage" class="message"></div>
    </div>

    <script>
      const form = document.getElementById("contactForm");
      const responseMessage = document.getElementById("responseMessage");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          message: document.getElementById("message").value,
        };

        try {
          const res = await fetch("http://localhost:3000/send", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(data),
          });

          if (res.ok) {
            responseMessage.textContent = "Message sent successfully!";
            responseMessage.className = "message success";
            form.reset();
          } else {
            throw new Error();
          }
        } catch (err) {
          responseMessage.textContent = "Failed to send message.";
          responseMessage.className = "message error";
        }
      });
    </script>
  </body>
</html>
